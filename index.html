<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S.H.I.V.I. — Smart Humanistic assistance Virtual Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Starfield -->
<div id="starfield"></div>
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>

<!-- Toast -->
<div id="toast"></div>

<!-- Main app shell -->
<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-dots"><span></span><span></span><span></span></div>
    <div class="header-title">S.H.I.V.I. &nbsp;·&nbsp; Neural Voice assistance &nbsp;v2.0</div>
    <div class="header-status">
      <span class="status-led" id="led"></span>
      <span id="sys-state">ONLINE</span>
    </div>
  </header>

  <!-- Center pane -->
  <main class="center">

    <!-- Orb + rings -->
    <div class="orb-wrap">
      <div class="orb" id="orb" title="Click to speak" role="button" tabindex="0" aria-label="Activate SHIVI voice input">
        <!-- rings -->
        <div class="orb-ring"></div>
        <div class="orb-ring"></div>
        <div class="orb-ring"></div>
        <!-- core with canvas -->
        <div class="orb-core">
          <canvas id="wave-canvas"></canvas>
        </div>
        <!-- mic icon -->
        <div class="orb-icon" id="orb-icon">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round">
            <path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
            <path d="M19 10a7 7 0 0 1-14 0"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Transcript -->
    <div class="transcript-area">
      <div class="transcript-text" id="transcript">Click the orb to speak</div>
      <div class="transcript-sub" id="transcript-sub">SHIVI READY</div>
    </div>

    <!-- Waveform bars decoration -->
    <div class="wave-bars" id="wave-bars">
      <!-- generated by JS -->
    </div>

    <!-- Text input row -->
    <div class="text-input-row">
      <input class="text-input" id="text-input" type="text" placeholder="Or type a command…" />
      <button class="send-btn" id="send-btn" aria-label="Send">⮕</button>
    </div>

    <!-- Controls -->
    <div class="controls">
      <select class="ctrl-select" id="lang-select" aria-label="Language">
        <option value="en">🌐 English</option>
        <option value="hi">🇮🇳 हिंदी</option>
        <option value="bh">भोजपुरी</option>
      </select>
      <select class="ctrl-select" id="voice-select" aria-label="Voice"></select>
      <button class="ctrl-btn" id="test-btn">🔊 Test</button>
      <button class="ctrl-btn" id="clear-btn">🗑 Clear</button>
    </div>

  </main>

  <!-- Sidebar -->
  <aside class="sidebar">

    <!-- Mood -->
    <div class="sidebar-section">
      <div class="sidebar-label">Neural Mood</div>
      <div class="mood-row">
        <div class="mood-circle"></div>
        <div class="mood-text">
          <div class="mood-name" id="mood-name">Focused</div>
          <div id="mood-desc">Ready to assist you.</div>
        </div>
      </div>
    </div>

    <!-- Metrics -->
    <div class="sidebar-section">
      <div class="sidebar-label">System Metrics</div>
      <div class="metrics">
        <div class="metric">
          <span class="metric-label">Response</span>
          <div class="metric-bar-wrap"><div class="metric-bar" id="mb-resp" style="width:82%"></div></div>
          <span class="metric-val" id="mv-resp">82%</span>
        </div>
        <div class="metric">
          <span class="metric-label">Clarity</span>
          <div class="metric-bar-wrap"><div class="metric-bar" id="mb-clar" style="width:91%"></div></div>
          <span class="metric-val" id="mv-clar">91%</span>
        </div>
        <div class="metric">
          <span class="metric-label">Mood IQ</span>
          <div class="metric-bar-wrap"><div class="metric-bar" id="mb-mood" style="width:67%"></div></div>
          <span class="metric-val" id="mv-mood">67%</span>
        </div>
        <div class="metric">
          <span class="metric-label">Sessions</span>
          <div class="metric-bar-wrap"><div class="metric-bar" id="mb-sess" style="width:45%"></div></div>
          <span class="metric-val" id="mv-sess">45%</span>
        </div>
      </div>
    </div>

    <!-- Quick commands -->
    <div class="sidebar-section">
      <div class="sidebar-label">Quick Commands</div>
      <div class="quick-grid">
        <button class="quick-btn" data-cmd="what time is it">⏰ Time</button>
        <button class="quick-btn" data-cmd="what is the date today">📅 Date</button>
        <button class="quick-btn" data-cmd="open google">🔍 Google</button>
        <button class="quick-btn" data-cmd="open youtube">▶ YouTube</button>
        <button class="quick-btn" data-cmd="tell me a joke">😄 Joke</button>
        <button class="quick-btn" data-cmd="tell me about yourself">🤖 About</button>
        <button class="quick-btn" data-cmd="what is the weather">🌤 Weather</button>
        <button class="quick-btn" data-cmd="open whatsapp">💬 WhatsApp</button>
      </div>
    </div>

    <!-- History -->
    <div class="sidebar-label" style="padding: 12px 16px 4px; flex-shrink:0;">Command History</div>
    <div class="history-wrap" id="history-wrap">
      <div class="history-empty" id="history-empty">No commands yet.</div>
    </div>

  </aside>
</div>
<script src="app.js"></script>  
</body>
</html>
